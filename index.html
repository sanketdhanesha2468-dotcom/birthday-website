<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Priya! 🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            animation: slideIn 0.5s ease-in-out;
        }

        .slide.active {
            display: flex;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-container h1 {
            color: #ff69b4;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .password-container .hint {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .password-display {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        #passwordInput {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            font-size: 1.1em;
            text-align: center;
        }

        .password-container button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff1493;
            margin-top: 10px;
            font-weight: bold;
        }

        .game-container {
            width: 95%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h2 {
            color: #ff69b4;
            font-size: 2em;
        }

        .surprise-message {
            color: #ff1493;
            font-size: 1.2em;
            font-weight: bold;
        }

        .score-display {
            font-size: 1.3em;
            color: #ff69b4;
            font-weight: bold;
            margin-top: 10px;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            height: auto;
        }

        .birthday-message {
            text-align: center;
            animation: birthdayAppear 1s ease-out;
            padding: 20px;
        }

        @keyframes birthdayAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #birthdayTitle {
            font-size: 3.5em;
            font-weight: bold;
            font-style: italic;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .emoji {
            animation: emojiFloat 2s ease-in-out infinite;
        }

        @keyframes emojiFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        #birthdaySubtitle {
            font-size: 1.8em;
            color: #555;
            margin-bottom: 50px;
        }

        .play-again-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff69b4 0%, #ffb6d9 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Password Slide -->
    <div id="slide1" class="slide active">
        <div class="password-container">
            <h1>Enter Password</h1>
            <p class="hint">Check the top right side 👆</p>
            <div class="password-display"><span>1234</span></div>
            <input type="password" id="passwordInput" placeholder="Enter password" maxlength="4">
            <button onclick="checkPassword()">Submit</button>
            <p id="errorMsg" class="error"></p>
        </div>
    </div>

    <!-- Game Slide -->
    <div id="slide2" class="slide">
        <div class="game-container">
            <div class="game-header">
                <h2>Ping Pong Game 🏓</h2>
                <p class="surprise-message">Score 5 points to win! 🎁</p>
                <div class="score-display">Score: <span id="score">0</span>/5</div>
            </div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
    </div>

    <!-- Birthday Slide -->
    <div id="slide3" class="slide">
        <div class="birthday-message">
            <h1 id="birthdayTitle">Happy Birthday dear Priya <span class="emoji">🎉🍰</span></h1>
            <h2 id="birthdaySubtitle">Let God bless you and help you to achieve what you want in your life <span class="emoji">😊</span></h2>
            <button onclick="playAgain()" class="play-again-btn">Play Again!</button>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2733/2733-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // PASSWORD FUNCTIONS
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (input === '1234') {
                errorMsg.textContent = '';
                moveToSlide(2);
                startGameNow();
            } else {
                errorMsg.textContent = '❌ Wrong password!';
                document.getElementById('passwordInput').value = '';
            }
        }

        function moveToSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide' + n).classList.add('active');
        }

        function playAgain() {
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').textContent = '';
            moveToSlide(1);
            document.getElementById('passwordInput').focus();
        }

        // GAME VARIABLES
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = false;
        let score = 0;

        // Paddle
        let paddle = {
            x: 0,
            y: 0,
            w: 100,
            h: 15,
            speed: 8,
            dx: 0
        };

        // Ball
        let ball = {
            x: 0,
            y: 0,
            radius: 8,
            dx: 5,
            dy: -5,
            speed: 6
        };

        // Mouse position
        let mouseX = canvas.width / 2;

        // Initialize game
        function resetGame() {
            paddle.x = canvas.width / 2 - paddle.w / 2;
            paddle.y = canvas.height - 30;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 5;
            ball.dy = -5;
            score = 0;
            document.getElementById('score').textContent = '0';
        }

        // Mouse move
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
        });

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw paddle
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            // Draw ball
            ctx.fillStyle = '#ff1493';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw score
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 20, 30);
        }

        function updateGame() {
            if (!gameRunning) return;

            // Move paddle towards mouse
            if (mouseX < paddle.x - 10) {
                paddle.x -= paddle.speed;
            } else if (mouseX > paddle.x + paddle.w + 10) {
                paddle.x += paddle.speed;
            }

            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball hitting walls
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Ball hitting paddle
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.h &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.w) {
                ball.dy = -ball.dy;
                score++;
                document.getElementById('score').textContent = score;

                if (score >= 5) {
                    gameRunning = false;
                    triggerFireworks();
                    setTimeout(() => moveToSlide(3), 1500);
                }
            }

            // Ball fell down
            if (ball.y > canvas.height) {
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.dx = 5;
                ball.dy = -5;
            }
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function startGameNow() {
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        function triggerFireworks() {
            if (typeof confetti !== 'undefined') {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }
        }

        // Music
        window.addEventListener('load', () => {
            const music = document.getElementById('bgMusic');
            music.volume = 0.3;
            music.play().catch(() => {});
        });

        // Password input Enter key
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // Start game loop on load
        document.addEventListener('DOMContentLoaded', () => {
            gameLoop();
            document.getElementById('passwordInput').focus();
        });
    </script>
</body>
</html>
